<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>藤不语 · 开局</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1e1a1e 0%, #2a2328 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            padding: 12px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: rgba(30, 20, 25, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid #6b4e5e;
            border-radius: 28px;
            padding: 24px 16px 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6), 0 0 0 1px #3f2e38 inset;
            text-align: center;
        }
        h1 {
            color: #d9c0c9;
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 6px;
            border-bottom: 1px dashed #7a5f6b;
            padding-bottom: 14px;
            margin-bottom: 8px;
        }
        .sub {
            color: #ab8a99;
            margin-bottom: 20px;
            font-style: italic;
            font-size: 0.85rem;
        }
        .choice-box {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .story-link {
            flex: 1;
            background: #2e1f26;
            border: 1px solid #8f6b7c;
            border-radius: 24px;
            padding: 14px 6px;
            color: #f3e2e8;
            text-decoration: none;
            box-shadow: 0 4px 0 #140d11;
            transition: all 0.1s ease;
            text-align: center;
            display: block;
            cursor: pointer;
        }
        .story-link:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #140d11;
        }
        .btn-icon {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 6px;
        }
        .btn-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 4px;
            color: #f3e2e8;
        }
        .btn-desc {
            font-size: 0.65rem;
            color: #bb9aab;
            line-height: 1.3;
        }
        .footer-note {
            color: #6e5360;
            font-size: 0.7rem;
            margin-top: 16px;
            border-top: 1px solid #4a3540;
            padding-top: 16px;
            text-align: center;
        }
        .footer-line {
            display: block;
        }
        .wisteria-deco {
            font-size: 1.8rem;
            opacity: 0.6;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="wisteria-deco">🟣🌿</div>
    <h1>藤不语</h1>
    <div class="sub">—— 紫藤知道，风不知道 ——</div>

    <div class="choice-box">
        <!-- 点击切换到滑动条 0 -->
        <div class="story-link" onclick="switchToOpening(0)">
            <span class="btn-icon">🌧️</span>
            <div class="btn-title">七年前·暴雨夜</div>
            <div class="btn-desc">车祸、背叛、葬礼…<br>直到推广券出现</div>
        </div>

        <!-- 点击切换到滑动条 1 -->
        <div class="story-link" onclick="switchToOpening(1)">
            <span class="btn-icon">🌸</span>
            <div class="btn-title">两个月后·紫藤依旧</div>
            <div class="btn-desc">风波平息，第四家分店<br>对视时风铃响了</div>
        </div>
    </div>

    <div class="footer-note">
        <span class="footer-line">🌸 点击选项，故事将直接切换</span>
        <span class="footer-line">—— 佐藤惠与你的共犯物语 ——</span>
    </div>
</div>

<script>
    async function switchToOpening(swipeId) {
        const clickedCard = event.currentTarget;
        clickedCard.style.opacity = '0.6';
        clickedCard.style.pointerEvents = 'none';

        try {
            const messages = await getChatMessages?.('0', { include_swipe: true }) 
                          || (window.SillyTavern?.getContext?.()?.chat?.messages);

            if (!messages || messages.length < 2) {
                throw new Error('聊天消息不足，请确保已收到 AI 回复。');
            }

            const aiMessage = messages[1];
            if (!aiMessage.swipes || aiMessage.swipes.length <= swipeId) {
                throw new Error(`滑动条 ${swipeId} 不存在，请先为 AI 第一条回复添加至少 ${swipeId + 1} 个滑动条。`);
            }

            const setChatMessage = window.setChatMessage || window.SillyTavern?.getContext?.()?.setChatMessage;
            if (typeof setChatMessage === 'function') {
                await setChatMessage(aiMessage.swipes[swipeId], 1, {
                    swipe_id: swipeId,
                    refresh: 'display_and_render_current'
                });
            } else {
                if (typeof aiMessage.setSwipe === 'function') {
                    aiMessage.setSwipe(swipeId);
                } else {
                    throw new Error('无法找到切换滑动条的函数。');
                }
            }
        } catch (error) {
            console.error('切换失败:', error);
            alert('切换失败: ' + error.message);
        } finally {
            clickedCard.style.opacity = '1';
            clickedCard.style.pointerEvents = 'auto';
        }
    }
</script>
</body>
</html>
