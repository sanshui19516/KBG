<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藤不语 · 开局</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1e1a1e 0%, #2a2328 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: rgba(30, 20, 25, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid #6b4e5e;
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px #3f2e38 inset;
            text-align: center;
        }
        h1 {
            color: #d9c0c9;
            font-size: 2.4rem;
            font-weight: 400;
            letter-spacing: 6px;
            border-bottom: 1px dashed #7a5f6b;
            padding-bottom: 18px;
            margin-bottom: 8px;
        }
        .sub {
            color: #ab8a99;
            margin-bottom: 36px;
            font-style: italic;
        }
        .choice-box { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .story-link {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #2e1f26;
            border: 1px solid #8f6b7c;
            border-radius: 60px;
            padding: 18px 22px;
            color: #f3e2e8;
            font-size: 1.3rem;
            text-decoration: none;
            box-shadow: 0 6px 0 #140d11;
            transition: all 0.1s ease;
            text-align: left;
        }
        .story-link:hover { background: #3f2a34; transform: translateY(-2px); box-shadow: 0 8px 0 #140d11; }
        .story-link:active { transform: translateY(3px); box-shadow: 0 3px 0 #140d11; }
        .btn-icon { font-size: 2.0rem; }
        .btn-text { flex: 1; }
        .btn-desc { font-size: 0.85rem; color: #bb9aab; margin-top: 5px; }
        .footer-note {
            color: #6e5360;
            font-size: 0.8rem;
            margin-top: 30px;
            border-top: 1px solid #4a3540;
            padding-top: 20px;
        }
        .wisteria-deco { font-size: 2.2rem; opacity: 0.6; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="wisteria-deco">🟣🌿</div>
    <h1>藤不语</h1>
    <div class="sub">—— 紫藤知道，风不知道 ——</div>

    <div class="choice-box">
        <a href="/greeting 1" class="story-link">
            <span class="btn-icon">🌧️</span>
            <span class="btn-text">
                七年前 · 暴雨夜<br>
                <span class="btn-desc">从那个改变一切的夜晚开始，车祸、背叛、葬礼……直到那张推广券出现。</span>
            </span>
        </a>

        <a href="/greeting 2" class="story-link">
            <span class="btn-icon">🌸</span>
            <span class="btn-text">
                两个月后 · 紫藤依旧<br>
                <span class="btn-desc">推广券风波平息，花店开了第四家分店。对视的那一刻，风铃响了。</span>
            </span>
        </a>
    </div>

    <div class="footer-note">
        🌸 点击选项，故事将直接开始<br>
        —— 佐藤惠与你的共犯物语 ——
    </div>
</div>
</body>
</html>
